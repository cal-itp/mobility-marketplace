<header class="d-none d-lg-flex align-items-center justify-content-between header mx-auto">
  {% include 'site-logo.html' %}
  <div class="d-flex flex-column align-items-end gap-3">
    <nav class="d-flex gap-3">
      <a
        class="contact"
        href="/about/"
        {% if page.url == '/about/' %}
          aria-current="page"
        {% endif %}
      >
        About
      </a>
      <a
        class="contact"
        href="/contact/"
        {% if page.url == '/contact/' %}
          aria-current="page"
        {% endif %}
      >
        Contact
      </a>
    </nav>
    <nav class="global-nav" aria-label="Primary">
      <ul class="d-flex justify-space-between">
        {% include 'link-repeater.html', menu_items: site.navigation, list_class: 'mb-0' %}
      </ul>
    </nav>
  </div>
</header>
